        <h3>不看眼睛，改看甜點的奇幻空間</h3>
        <p>你眼前的這棟紅磚建築，在1927年是由日籍眼科博士宮原武雄所興建。它曾歷經地震與颱風的摧殘成為廢墟，直到「日出」團隊將它變身為充滿霍格華茲風格的甜點殿堂。</p>
        
        <p><b>🔍 觀察小任務：</b> 抬頭看看天花板的透光玻璃，那是剪紙風格的「喜」字，象徵著這座老建築的新生與喜悅。</p>
