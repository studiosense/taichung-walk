        <span class="tag">在地美食地圖</span>
        <h3>台中人的大廚房：百年六角樓</h3>
        <p>第二市場建於1917年，當時被稱為「新富町市場」，專門販售精緻貨品給當時的日本人，因此有「王公市場」之稱。市場中心點的「六角樓」是它的心臟，往外延伸出放射狀的街道。</p>
