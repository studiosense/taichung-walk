<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時空畫筆：台中舊城藝術導覽</title>
    <style>
        :root {
            --primary-color: #8c7355; /* 復古大地色 */
            --bg-color: #f4f1ea;
        }

        body {
            font-family: "Noto Serif TC", serif;
            margin: 0;
            background-color: var(--bg-color);
            color: #333;
        }

        /* 入口畫面 */
        .welcome-screen {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('bg-artist.jpg'); /* 建議放一張台中公園老畫作 */
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            transition: opacity 1.5s ease;
        }

        .welcome-screen h1 { font-size: 2.5rem; letter-spacing: 5px; }
        .welcome-screen p { font-size: 1.1rem; margin-bottom: 30px; }

        /* 按鈕設計 */
        .start-btn {
            padding: 12px 35px;
            border: 2px solid white;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            cursor: pointer;
        }

        .start-btn:hover { background: white; color: var(--primary-color); }

        /* 景點卡片容器 */
        .container { padding: 20px; display: none; }
        
        .station-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        /* 藝術對位容器 */
        .comparison-container {
            position: relative;
            width: 100%;
            height: 250px;
            overflow: hidden;
        }

        .art-image, .real-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s;
        }

        .art-image { opacity: 1; }
        .real-image { opacity: 0; }

        /* 切換按鈕樣式 */
        .toggle-view-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(255,255,255,0.9);
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .info-content { padding: 20px; }
        .audio-player { margin-top: 15px; width: 100%; }
        
        .fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <audio id="welcome-bgm" loop>
        <source src="showa-modern.MP3" type="audio/mpeg">
    </audio>

    <div id="welcome" class="welcome-screen">
        <h1>時空畫筆</h1>
        <p>台中舊城藝術散步</p>
        <a href="javascript:void(0);" onclick="startTour()" class="start-btn">開啟導覽</a>
    </div>

    <div id="main-content" class="container">
        
        <div class="station-card">
            <div class="comparison-container" id="station1">
                <img src="lin-lake.jpg" class="art-image" alt="林之助畫作">
                <img src="real-lake.jpg" class="real-image" alt="現代實景">
                <button class="toggle-view-btn" onclick="toggleView('station1')">👁️ 切換現代實景</button>
            </div>
            <div class="info-content">
                <h3>台中公園：湖心亭</h3>
                <p>「這裡的綠與紅，畫家們最熱愛的寫生焦點。」</p>
                <audio controls class="audio-player">
                    <source src="audio-chen.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>

        <div class="station-card">
            <div class="comparison-container" id="station2">
                <img src="lin-art.JPG" class="art-image" alt="林之助膠彩畫">
                <img src="lin-studio.jpg" class="real-image" alt="林之助與妻子">
                <button class="toggle-view-btn" onclick="toggleView('station2')">👁️ 切換現代實景</button>
            </div>
            <div class="info-content">
                <h3>林之助紀念館</h3>
                <p>感受「膠彩之父」筆下的光影細膩與畫室清幽。</p>
                <audio controls class="audio-player">
                    <source src="audio-lin.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>

    </div>

<script>
    function startTour() {
    var audio = document.getElementById("welcome-bgm");
    var welcome = document.getElementById("welcome");
    var main = document.getElementById("main-content");

    // 1. 播放背景音樂
    audio.play();

    // 2. 設定在 15 秒後自動淡出並停止 (秒數可自行調整)
    setTimeout(function() {
        // 創造一個平滑的淡出效果 (Fade out)
        var fadeAudio = setInterval(function () {
            if (audio.volume > 0.1) {
                audio.volume -= 0.1; // 每次減掉 0.1 的音量
            } else {
                audio.pause();
                audio.currentTime = 0; // 重置音樂進度
                clearInterval(fadeAudio);
            }
        }, 200); // 每 0.2 秒調整一次
    }, 15000); // 15000 毫秒 = 15 秒

    // 3. 入口畫面淡出轉場
    welcome.classList.add('fade-out');
    
    setTimeout(function() {
        welcome.style.display = 'none';
        main.style.display = 'block';
        window.scrollTo(0,0);
    }, 1500);
}


        // 切換畫作與實景
        function toggleView(stationId) {
            const container = document.getElementById(stationId);
            const art = container.querySelector('.art-image');
            const real = container.querySelector('.real-image');
            const btn = container.querySelector('.toggle-view-btn');

            if (art.style.opacity === '0') {
                art.style.opacity = '1';
                real.style.opacity = '0';
                btn.innerText = '👁️ 切換現代實景';
            } else {
                art.style.opacity = '0';
                real.style.opacity = '1';
                btn.innerText = '🎨 切換藝術原作';
            }
        }
    </script>
</body>
</html>
