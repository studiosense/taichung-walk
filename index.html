<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台中舊城導覽 - 時空散步</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Noto Sans TC', sans-serif; }
        
        /* 背景圖設定 */
        .welcome-screen {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('bg-index.jpg'); /* 建議換成你的台中車站美照 */
            background-size: cover;
            background-position: center;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; letter-spacing: 5px; }
        p { font-size: 1.1rem; margin-bottom: 30px; opacity: 0.9; }

        .start-btn {
            padding: 15px 40px;
            background-color: #d4a373;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .start-btn:hover { background-color: #8b5e3c; transform: scale(1.05); }

        .footer-info {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
        }


        .fade-out {
            opacity: 0;
            transition: opacity 3s ease-out; /* 3秒內慢慢變透明 */
        }


    </style>
</head>

<body>

      <div class="welcome-screen">
        <h1>時空散步</h1>
        <p>探索台中舊城的百年物語</p>
              
        <audio id="welcome-bgm" preload="auto">
          <source src="bgm-index.MP3" type="audio/mpeg">
        </audio>

       <a href="javascript:void(0);" onclick="playAndGo()" class="start-btn">踏上旅程</a>

        <div class="footer-nav-links" style="margin-top: 50px; display: flex; gap: 20px;">
            </div>

        <div class="footer-info">
            © 2026 台中舊城導覽系統 Studio Sense
        </div>
    </div>

<script>
function playAndGo() {
    var audio = document.getElementById("welcome-bgm");
    var screen = document.querySelector('.welcome-screen');
    
    // 先嘗試播放音樂
    audio.play().then(() => {
        // 3秒後開始啟動「畫面淡出」
        setTimeout(function() {
            screen.classList.add('fade-out');
        }, 3000);

        // 5秒後正式跳轉（此時畫面已經變暗了）
        setTimeout(function() {
            window.location.href = "station.html";
        }, 5000); 
    }).catch(error => {
        window.location.href = "station.html";
    });
}

</script>
 

</body>
</html>
